body{background:#f5f5f5;color:#1a1a1a}

const PEXELS_BASE="https://images.pexels.com/photos";
const PEXELS_PARAMS="auto=compress&
const PEXELS_PARAMS="auto=compress&cs=tinysrgb&w=600";
const PEXELS_EXTRA_PARAMS="auto=compress&cs=tinysrgb&w=1200";

function buildImgUrl(id,w=600){return `${PEXELS_BASE}/${id}/pexels-photo-${id}.jpeg?auto=compress&cs=tinysrgb&w=${w}`}

function renderCard(p){const allImgs=[buildImgUrl(p.pexelsExterior[0]),buildImgUrl(p.pexelsExterior[1]),...p.pexelsInterior.map(id=>buildImgUrl(id))];return`
<div class="card" data-id="${p.id}" onclick="openModal(${p.id})">
<div class="carousel" data-idx="0">${allImgs.map((url,i)=>`<img src="${url}" alt="" class="${i===0?'active':''}" loading="lazy">`).join('')}<div class="carousel-dots">${allImgs.map((_,i)=>`<span class="${i===0?'active':''}" data-i="${i}" onclick="event.stopPropagation();goTo(${p.id},${i})"></span>`).join('')}</div><span class="badge">${p.type}</span><span class="price-badge">$${(p.price/1e6).toFixed(1)}M</span></div>
<div class="info"><h3>${p.title}</h3><div class="address">${p.address}</div><div class="meta"><span>🛏 ${p.beds}</span><span>🚿 ${p.baths}</span><span>📐 ${p.sqft.toLocaleString()} sqft</span></div><div class="desc">${p.desc}</div></div></div>`}

function renderModal(p){const allImgs=[buildImgUrl(p.pexelsExterior[0],1200),buildImgUrl(p.pexelsExterior[1],1200),...p.pexelsInterior.map(id=>buildImgUrl(id,1200))];const am=p.fullDesc?[p.fullDesc]:[];const amens=p.fullDesc?p.fullDesc.match(/(wine cellar|pool|garden|terrace|fireplace|kitchen|spa|dock|theater|gym|garage|library|patio|deck|rooftop|balcony|onsen)/gi):[];const uAmen=amens?[...new Set(amens)].slice(0,10):[];return`
<div class="carousel" data-idx="0" data-modal="1">${allImgs.map((url,i)=>`<img src="${url}" alt="" class="${i===0?'active':''}" loading="lazy">`).join('')}<div class="carousel-dots">${allImgs.map((_,i)=>`<span class="${i===0?'active':''}" data-i="${i}" onclick="event.stopPropagation();goToModal(${p.id},${i})"></span>`).join('')}</div><span class="badge">${p.type}</span><span class="price-badge">$${(p.price/1e6).toFixed(1)}M</span></div>
<h2>${p.title}</h2><div class="address">${p.address}</div><div class="meta"><span>🛏 ${p.beds} Beds</span><span>🚿 ${p.baths} Baths</span><span>📐 ${p.sqft.toLocaleString()} sqft</span></div><div class="desc">${p.desc}</div>${uAmen.length?`<div class="amenities">${uAmen.map(a=>`<span>${a.charAt(0).toUpperCase()+a.slice(1)}</span>`).join('')}</div>`:''}<div class="full-desc">${p.fullDesc||p.desc}</div>`}

const carouselTimers={};

function startCarousel(cardId,isModal=false){stopCarousel(cardId);const prefix=isModal?'modal':'card';const container=isModal?document.querySelector('#modalBody .carousel'):document.querySelector(`.card[data-id="${cardId}"] .carousel`);if(!container)return;const imgs=container.querySelectorAll('img');const dots=container.querySelectorAll('.carousel-dots span');if(imgs.length<2)return;carouselTimers[cardId]=setInterval(()=>{let ci=parseInt(container.dataset.idx||0);imgs[ci].classList.remove('active');dots[ci]&&dots[ci].classList.remove('active');ci=(ci+1)%imgs.length;container.dataset.idx=ci;imgs[ci].classList.add('active');dots[ci]&&dots[ci].classList.add('active')},4000)}

function stopCarousel(id){if(carouselTimers[id]){clearInterval(carouselTimers[id]);delete carouselTimers[id]}}

function goTo(cardId,idx){stopCarousel(cardId);const container=document.querySelector(`.card[data-id="${cardId}"] .carousel`);if(!container)return;const imgs=container.querySelectorAll('img');const dots=container.querySelectorAll('.carousel-dots span');imgs.forEach(i=>i.classList.remove('active'));dots.forEach(d=>d.classList.remove('active'));container.dataset.idx=idx;imgs[idx].classList.add('active');dots[idx].classList.add('active')}

let modalCarouselTimer=null;let modalId=null;

function goToModal(id,idx){if(modalCarouselTimer){clearInterval(modalCarouselTimer);modalCarouselTimer=null}const container=document.querySelector('#modalBody .carousel');if(!container)return;const imgs=container.querySelectorAll('img');const dots=container.querySelectorAll('.carousel-dots span');imgs.forEach(i=>i.classList.remove('active'));dots.forEach(d=>d.classList.remove('active'));container.dataset.idx=idx;imgs[idx].classList.add('active');dots[idx].classList.add('active');modalCarouselTimer=setInterval(()=>{let ci=parseInt(container.dataset.idx||0);imgs[ci].classList.remove('active');dots[ci]&&dots[ci].classList.remove('active');ci=(ci+1)%imgs.length;container.dataset.idx=ci;imgs[ci].classList.add('active');dots[ci]&&dots[ci].classList.add('active')},4000)}

function openModal(id){const p=properties.find(x=>x.id===id);if(!p)return;modalId=id;document.getElementById('modalBody').innerHTML=renderModal(p);document.getElementById('propertyModal').classList.add('show');document.body.style.overflow='hidden';if(modalCarouselTimer){clearInterval(modalCarouselTimer)}modalCarouselTimer=setInterval(()=>{const container=document.querySelector('#modalBody .carousel');if(!container)return;const imgs=container.querySelectorAll('img');const dots=container.querySelectorAll('.carousel-dots span');if(imgs.length<2)return;let ci=parseInt(container.dataset.idx||0);imgs[ci].classList.remove('active');dots[ci]&&dots[ci].classList.remove('active');ci=(ci+1)%imgs.length;container.dataset.idx=ci;imgs[ci].classList.add('active');dots[ci]&&dots[ci].classList.add('active')},4000)}

function closeModal(){document.getElementById('propertyModal').classList.remove('show');document.body.style.overflow='';if(modalCarouselTimer){clearInterval(modalCarouselTimer);modalCarouselTimer=null}}

document.getElementById('propertyModal').addEventListener('click',function(e){if(e.target===this)closeModal()});

function applyFilters(){const city=document.getElementById('cityFilter').value;const type=document.getElementById('typeFilter').value;const bed=document.getElementById('bedFilter').value;const q=document.getElementById('searchInput').value.toLowerCase();const filtered=properties.filter(p=>{if(city&&p.city!==city)return false;if(type&&p.type!==type)return false;if(bed&&p.beds<parseInt(bed))return false;if(q&&!p.address.toLowerCase().includes(q)&&!p.desc.toLowerCase().includes(q)&&!p.title.toLowerCase().includes(q))return false;return true});document.getElementById('propertyGrid').innerHTML=filtered.map(renderCard).join('');filtered.forEach(p=>{const container=document.querySelector(`.card[data-id="${p.id}"] .carousel`);if(container&&container.querySelectorAll('img').length>1)startCarousel(p.id)})}

(function init(){const cities=[...new Set(properties.map(p=>p.city))].sort();const sel=document.getElementById('cityFilter');cities.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o)});document.getElementById('propertyGrid').innerHTML=properties.map(renderCard).join('');properties.forEach(p=>{const container=document.querySelector(`.card[data-id="${p.id}"] .carousel`);if(container&&container.querySelectorAll('img').length>1)startCarousel(p.id)})})();
</script></body></html>
